services:
  cart-service:
    build:
      context: .
      dockerfile: Dockerfile
    
    ports:
      - "8000:8000"
    
    container_name: keranjang-service-app
    
    environment:
      - APP_NAME=Keranjang-Service
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - IAE_API_KEY=102022430021
      - SERVICE_NAME=Cart-Service
      - API_VERSION=v1
      - L5_SWAGGER_GENERATE_ALWAYS=true
    
    volumes:
      - .:/var/www/html
      - ./database:/var/www/html/database
    
    working_dir: /var/www/html
    
    command: sh -c "composer install --no-interaction --prefer-dist && php artisan key:generate --force && php artisan migrate:fresh --seed && php artisan l5-swagger:generate && php artisan serve --host=0.0.0.0 --port=8000"
    
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/database/database.sqlite"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    
    restart: unless-stopped
    
    networks:
      - cart-network

networks:
  cart-network:
    driver: bridge