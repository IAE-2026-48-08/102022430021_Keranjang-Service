type Cart {
    id: ID!
    customer_name: String!
    status: String!
    items: [CartItem!]! @hasMany
}

type CartItem {
    id: ID!
    cart_id: ID!
    product_id: Int!
    product_name: String!
    quantity: Int!
    price: Float!
}

type Query {
    carts: [Cart!]! @all(model: "App\\Models\\Cart")
    cart(id: ID! @eq): Cart @find(model: "App\\Models\\Cart")
}